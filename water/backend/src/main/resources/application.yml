spring:
  application:
    name: gk-blockchain-platform
  # 默认 dev 环境
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blockchain
    username: root
    password: 123456
    hikari:
      idle-timeout: 23333 # 10 minutes
      max-lifetime: 23333 # 30 minutes
  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 100MB
server:
  address: 0.0.0.0
  port: 8080
  servlet:
#    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: satoken
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 86400
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: 86400
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true

# 项目相关配置
app:
  # 名称
  name: gk-blockchain-platform
#  # 版本
#  version: 1.0.0
#  # 版权年份
#  copyrightYear: 2024
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: ./userUpload

# 区块链配置
water:
  # 是否启用区块链
  enabled: true
  # 区块链节点地址
  peers: 127.0.0.1:20200
  # 群组ID
  groupId: 1
  # 证书路径
  certPath: conf
  # 私钥（可选，不配置则自动生成）
  hexPrivateKey:
  # 合约地址配置
  contract:
    waterAddress:
    keyValueStoreAddress:
